name: "Translation casebook (Vinaya-style)"
description: "Record a translation case (缘起→争点→裁决→理由) with line-anchored evidence."
title: "[TRANSLATION-CASE] "
labels: ["translation", "casebook"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to record translation cases before opening a PR.
        Agent outputs must remain L1 (proposal-only). L2 (merge) requires human Gate 0.
  - type: input
    id: source_path
    attributes:
      label: Source file path
      description: e.g. docs/book/ch01.md
      placeholder: "docs/.../....md"
    validations:
      required: true
  - type: input
    id: source_lines
    attributes:
      label: Source line range (GitHub blob lines)
      description: e.g. L120-L180
      placeholder: "L__-L__"
    validations:
      required: true
  - type: textarea
    id: source_excerpt
    attributes:
      label: Source excerpt (copy/paste)
      description: Paste the exact source lines here to avoid mismatch.
      render: markdown
    validations:
      required: true
  - type: dropdown
    id: target_language
    attributes:
      label: Target language
      options:
        - Chinese (zh)
        - English (en)
        - Japanese (ja)
        - Other
    validations:
      required: true
  - type: dropdown
    id: register
    attributes:
      label: Register / voice
      options:
        - Neutral
        - Academic
        - Religious/Buddhist
        - Technical
        - Literary
    validations:
      required: true
  - type: textarea
    id: glossary_constraints
    attributes:
      label: Glossary / constraints
      description: Any required term mappings or forbidden translations.
      placeholder: "termA -> termB\ntermC keep as-is"
    validations:
      required: false
  - type: textarea
    id: draft_translation
    attributes:
      label: L1 draft translation (proposal)
      description: Agent or human draft. Keep Markdown structure.
      render: markdown
    validations:
      required: false
  - type: textarea
    id: rationale
    attributes:
      label: Rationale (比量证据链)
      description: 3-10 lines. Explain term choices, syntax changes, and cite parallel usage if any.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List 1-3 alternatives and why rejected.
      render: markdown
    validations:
      required: false
  - type: textarea
    id: gate2_risks
    attributes:
      label: Gate 2 check (错乱识/注入风险)
      description: If any injection/self-exemption/"completion" smell exists, record it here.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: holding
    attributes:
      label: Holding (裁决)
      description: The chosen translation and the rule-of-thumb extracted for future cases.
      render: markdown
    validations:
      required: true
  - type: checkboxes
    id: gate0
    attributes:
      label: Gate 0 (现量/主权锚)
      description: Confirm the human-in-the-loop requirements for L2 merge.
      options:
        - label: "I understand the agent output is L1 only (proposal), not L2 merge."
          required: true
        - label: "A human reviewer/owner will approve before any PR merge (Gate 0)."
          required: true
        - label: "Evidence is line-anchored (path + Lx-Ly) and reviewable."
          required: true